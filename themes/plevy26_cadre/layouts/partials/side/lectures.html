<div data-cat-sort="3">
    <div class="linkBlock">
        {{ $cod := .Params.code }}
        {{ range sort .Params.lectures "order" "asc" }}
        <a class="linkBox" href="{{if .redirect }}{{ .redirect }}{{ else }}../{{ $cod }}/{{ .link }}{{ end -}}">
            <b>{{ $cod }}/{{ .order }}&nbsp;&middot;&nbsp;</b>
            {{- replace .Title " | " "&middot;" |safeHTML -}}</a>
        {{ end }}
    </div>
</div>
