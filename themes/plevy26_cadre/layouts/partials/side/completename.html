<div class="sideBlock">
    <div class="sideBlockIn"><div>
        <div data-cat-sort="2">
            <div class="flex-row" id="lightgallery">
                {{ range sort .Params.photogallery "order" "asc" }}
                <div class="place-self-center p-0.5 w-auto rounded-xl photoItem" data-src="https://drive.google.com/thumbnail?id={{- .img -}}&sz=w3000" aria-label="See image"><img loading="lazy" src="https://drive.google.com/thumbnail?id={{- .img -}}&sz=w500" title="{{ .name }}" alt="{{ .name }}" class="rounded" data-pagefind-index-attrs="title,alt"></div>
                {{ end }}
            </div>
        </div>
    </div></div>
    <div class="sideBlockIn"><div>
        <p data-pagefind-weight="6">{{ .Params.completename }}</p>
    </div></div>
</div>
